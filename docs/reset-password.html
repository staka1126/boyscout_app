<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワードの再設定 - ビーバーログ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0ebe3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-icon { font-size: 48px; }
    .logo-title {
      font-size: 20px;
      font-weight: 700;
      color: #4e342e;
      margin-top: 8px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #6d4c41; }

    button {
      width: 100%;
      padding: 14px;
      background: #6d4c41;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4e342e; }
    button:disabled { background: #bbb; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .form-area.hidden { display: none; }
    .success-area {
      display: none;
      text-align: center;
    }
    .success-area.show { display: block; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success-text { font-size: 15px; color: #333; line-height: 1.7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🦫</div>
      <div class="logo-title">ビーバーログ</div>
    </div>

    <div class="form-area" id="formArea">
      <h1>パスワードの再設定</h1>
      <p class="desc">新しいパスワードを入力してください。<br>8文字以上で設定してください。</p>

      <label for="password">新しいパスワード</label>
      <input type="password" id="password" placeholder="8文字以上" autocomplete="new-password" />

      <label for="passwordConfirm">パスワード（確認）</label>
      <input type="password" id="passwordConfirm" placeholder="もう一度入力" autocomplete="new-password" />

      <button id="submitBtn" onclick="resetPassword()">パスワードを変更する</button>

      <div class="message" id="errorMsg"></div>
    </div>

    <div class="success-area" id="successArea">
      <div class="success-icon">✅</div>
      <p class="success-text">パスワードを変更しました。<br>アプリに戻ってログインしてください。</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://ktvyvhejtjoblmbzaljp.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_BtOAp43Ger563wuL_0LUiA_Q-Ci-1tX';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { detectSessionInUrl: true, persistSession: true },
    });

    // URLからトークンを取得してセッションを確立
    async function initSession() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (code) {
        // PKCE フロー: code を exchangeCodeForSession で処理
        const { error } = await sb.auth.exchangeCodeForSession(code);
        if (error) {
          showError('リンクが無効または期限切れです。もう一度パスワードリセットをお試しください。');
          document.getElementById('submitBtn').disabled = true;
        }
      } else {
        showError('リンクが無効または期限切れです。もう一度パスワードリセットをお試しください。');
        document.getElementById('submitBtn').disabled = true;
      }
    }

    window.addEventListener('load', initSession);

    async function resetPassword() {
      const pw  = document.getElementById('password').value;
      const pw2 = document.getElementById('passwordConfirm').value;

      hideError();

      if (pw.length < 8) {
        showError('パスワードは8文字以上にしてください。');
        return;
      }
      if (pw !== pw2) {
        showError('パスワードが一致しません。');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '変更中...';

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        showError('変更に失敗しました: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'パスワードを変更する';
      } else {
        document.getElementById('formArea').classList.add('hidden');
        document.getElementById('successArea').classList.add('show');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.className = 'message error';
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>
</body>
</html>
