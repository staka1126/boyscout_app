import java.util.Properties
import java.io.FileInputStream

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new Properties()
keyProperties.load(new FileInputStream(keyPropertiesFile))

android {
    namespace "jp.tshub.beaverlog"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    defaultConfig {
        applicationId "jp.tshub.beaverlog"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias keyProperties["keyAlias"]
            keyPassword keyProperties["keyPassword"]
            storeFile file(keyProperties["storeFile"])
            storePassword keyProperties["storePassword"]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source '../..'
}

// flutter build apk がAPKを見つけられない問題の回避
// Gradleビルド後にflutter-apk/ディレクトリにAPKをコピー
afterEvaluate {
    tasks.named('assembleRelease').configure {
        doLast {
            def src = file("${buildDir}/outputs/apk/release/app-release.apk")
            def dst = file("${buildDir}/outputs/flutter-apk/app-release.apk")
            if (src.exists()) {
                dst.parentFile.mkdirs()
                dst.bytes = src.bytes
                println "Copied APK to flutter-apk/"
            }
        }
    }

    // flutter build appbundle がAABを見つけられない問題の回避
    // Gradleビルド後にbundle/release/ディレクトリにAABをコピー
    tasks.named('bundleRelease').configure {
        doLast {
            def src = file("${buildDir}/outputs/bundle/release/app-release.aab")
            def dst = file("${rootDir}/../build/app/outputs/bundle/release/app-release.aab")
            if (src.exists()) {
                dst.parentFile.mkdirs()
                dst.bytes = src.bytes
                println "Copied AAB to build/app/outputs/bundle/release/"
            }
        }
    }
}
