name: boyscout_app
description: ビーバーログ - ビーバー隊 隊務管理アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ローカルDB (Android/iOS: sqflite, Linux/Windows/Web: sqflite_common_ffi)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # ナビゲーション
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.8.4

  # ユーティリティ
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  excel: ^4.0.6
  file_picker: ^8.0.0+1

  # レポート出力
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
